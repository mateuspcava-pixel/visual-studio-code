# visual-studio-code
# jogo da cobrinha HTML
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Cobrinha</title>
  <link rel="stylesheet" href="jogo_da_cobrinha.css">
</head>
<body>
  <h1>Jogo da Cobrinha</h1>
  <p>Use as setas do teclado para mover</p>
  <p>Pressione ENTER para reiniciar quando perder</p>

  <!-- HUD -->
  <div id="hud">
    <p id="nivel">Nível: 0</p>
    <p id="mapa">Mapa: 3x3</p>
    <p id="pontos">Pontuação: 0</p>
  </div>

  <!-- Grid do jogo -->
  <div class="grade" id="grade"></div>

  <script src="jogo_da_cobrinha.js"></script>
</body>
</html>
