# visual-studio-code
# jogo da cobrinha HTML

<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Snake Shop EVO</title>

<link rel="stylesheet" href="jogo_da_cobrinha.css">

</head>

<body class="skin-padrao">

<h1>🐍 Snake Shop EVO</h1>

<div id="menu">
  <button onclick="start('facil')">Fácil</button>
  <button onclick="start('normal')">Normal</button>
  <button onclick="start('dificil')">Difícil</button>

  <br><br>

  <button onclick="setSkin('padrao')">Padrão</button>
  <button onclick="setSkin('neon')">Neon</button>
  <button onclick="setSkin('fogo')">Fogo</button>
  <button onclick="setSkin('gelo')">Gelo</button>
  <button onclick="setSkin('rainbow')">Rainbow</button>
</div>

<p id="info"></p>
<p id="gameover"></p>

<div id="grade"></div>

<button onclick="restart()" id="restart" style="display:none;">Restart</button>

<script src="jogo_da_cobrinha.js"></script>

</body>
</html>
