# visual-studio-code
# jogo da cobrinha HTML

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jogo da Cobrinha</title>
  <link rel="stylesheet" href="jogo_da_cobrinha.css">
</head>
<body>
  <h1>Jogo da Cobrinha</h1>
  <p>Use as setas do teclado para mover a cobrinha.</p>
  <p id="vitoria"></p>
  <p id="derota"></p>


  <!-- HUD: Exibe informações do jogo -->
  <div id="hud">
    <p id="nivel"></p>
    <p id="mapa"></p>
    <p id="pontos"></p>
    <p id="tamanho"></p>
  </div>

  <!-- Botão para iniciar o jogo -->
  <div id="iniciarjogo">
    <button onclick="iniciarJogo()">Iniciar Jogo</button>
  </div>
  <div id="reiniciar">
    <button onclick="reiniciar()">reiniciar</button>
  </div>


  <!-- Menu de seleção de dificuldade -->
  <div id="menu">
    <button onclick="facil()">Fácil</button>
    <button onclick="normal()">Normal</button>
    <button onclick="dificil()">Difícil</button>
  </div>



  <!-- Grid do jogo -->
  <div class="grade" id="grade"></div>

  <!-- Script do jogo -->
  <script src="jogo_da_cobrinha.js"></script>
</body>
</html>
